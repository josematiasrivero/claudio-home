services:
  caddy:
    build: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  code-server:
    image: codercom/code-server:latest
    restart: unless-stopped
    environment:
      - DOCKER_USER=root
    user: root
    volumes:
      - /root/code:/home/coder/project
    ports:
      - "8080:8080"
    command: --bind-addr 0.0.0.0:8080 --auth none /home/coder/project

  db-backup:
    build: ./jobs
    restart: unless-stopped
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - /mnt/data/backups:/backups
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data:
  caddy_config:
